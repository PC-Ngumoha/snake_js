<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    h3 {
      width: fit-content;
      display: block;
      margin: 0 auto;
    }

    canvas {
      background: #9BBC0F;
      display: block;
      margin: 10px auto;
    }
  </style>

</head>

<body>
  <h3>Press ENTER to start game</h3>
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    const SNAKE_COLOR = "#306230";
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let x = 0;
    let y = 10;
    // const vel = 2;
    const seg_height = 10;
    const seg_width = 10;
    const segments = 5;
    const snake = [];
    let direction = { up: false, right: true, down: false, left: false };

    // Populate snake body.
    for (let i = 0; i < segments; i++) {
      snake[i] = { x: seg_width * i, y };
    }

    // draw snake
    function drawSnake () {
      for (let i = 0; i < snake.length; i++) {
        ctx.beginPath();
        ctx.rect(snake[i].x, snake[i].y, seg_width, seg_height);
        ctx.fillStyle = i === segments - 1 ? "red" : SNAKE_COLOR;
        ctx.fill();
        ctx.closePath();
      }
    }

    function draw () {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSnake();


      // move snake based on direction
      for (let i = 0; i < snake.length - 1; i++) {
        snake[i].x = snake[i + 1].x;
        snake[i].y = snake[i + 1].y;
      }
      // console.log(snake);
      // snake[segments - 1].x += seg_width;

      if (direction.up) {
        snake[snake.length - 1].y -= seg_height;
      } else if (direction.right) {
        snake[snake.length - 1].x += seg_width;
      } else if (direction.down) {
        snake[snake.length - 1].y += seg_height;
      } else if (direction.left) {
        snake[snake.length - 1].x -= seg_width;
      }
    }

    document.addEventListener("keydown", function (evt) {
      evt.preventDefault();
      if (evt.key === 'Enter') {
        setInterval(draw, 100);
      } else if (evt.key === 'Up' || evt.key === 'ArrowUp') {
        direction = { up: true, right: false, down: false, left: false };
      } else if (evt.key === 'Right' || evt.key === 'ArrowRight') {
        direction = { up: false, right: true, down: false, left: false };
      } else if (evt.key === 'Down' || evt.key === 'ArrowDown') {
        direction = { up: false, right: false, down: true, left: false };
      } else if (evt.key === 'Left' || evt.key === 'ArrowLeft') {
        direction = { up: false, right: false, down: false, left: true };
      }

      // console.log(direction);
    })
  </script>
</body>

</html>
