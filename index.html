<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    h3 {
      width: fit-content;
      display: block;
      margin: 0 auto;
    }

    canvas {
      background: #9BBC0F;
      display: block;
      margin: 10px auto;
    }
  </style>

</head>

<body>
  <h3>Press ENTER to start game</h3>
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    const SNAKE_COLOR = "#306230";
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let x = 0;
    let y = 10;
    // const vel = 2;
    const seg_height = 10;
    const seg_width = 10;
    const fruit_radius = 5;
    const segments = 20;
    const snake = [];
    let direction = { up: false, right: true, down: false, left: false };
    let game;
    let fruitX = Math.floor(Math.random() * canvas.width);
    let fruitY = Math.floor(Math.random() * canvas.height);
    let score = 0;

    // Populate snake body.
    for (let i = 0; i < segments; i++) {
      snake[i] = { x: seg_width * i, y };
    }

    const head = snake[snake.length - 1];

    // draw snake
    function drawSnake () {
      for (let i = 0; i < snake.length; i++) {
        ctx.beginPath();
        ctx.rect(snake[i].x, snake[i].y, seg_width, seg_height);
        ctx.fillStyle = i === snake.length - 1 ? "red" : SNAKE_COLOR;
        ctx.fill();
        ctx.closePath();
      }
    }

    // move snake
    function moveSnake () {
      // move snake based on direction
      for (let i = 0; i < snake.length - 1; i++) {
        snake[i].x = snake[i + 1].x;
        snake[i].y = snake[i + 1].y;
      }

      if (direction.up) {
        head.y -= seg_height;
      } else if (direction.right) {
        head.x += seg_width;
      } else if (direction.down) {
        head.y += seg_height;
      } else if (direction.left) {
        head.x -= seg_width;
      }
    }

    // detect Collision With Wall
    function collidedWithWall () {
      return head.x < 0
        || head.x > canvas.width - seg_width
        || head.y < 0
        || head.y > canvas.height - seg_height;
    }

    //detect collision with tail
    function collidedWithSelf () {
      for (let i = 0; i < snake.length - 1; i++) {
        if (
          head.x === snake[i].x && head.y === snake[i].y
        ) {
          return true;
        }

        // console.log(head.x + seg_width === snake[i].x
        //   && snake[i].x + seg_width === head.x
        //   && head.y + seg_height === snake[i].y
        //   && snake[i].y + seg_height === head.y);

        // console.log();
      }
      return false;
    }

    function drawFruit (x, y) {
      ctx.beginPath();
      ctx.arc(x, y, fruit_radius, 0, 2 * Math.PI);
      ctx.fillStyle = 'blue';
      ctx.fill();
      ctx.closePath();
    }

    function collidedWithFruit () {
      return head.x + seg_width >= fruitX
        && fruitX + fruit_radius >= head.x
        && head.y + seg_height >= fruitY
        && fruitY + fruit_radius >= head.y
    }

    function addSegment () {
      const lastX = snake[0].x;
      const lastY = snake[0].y;
      const new_segment = { x: lastX, y: lastY };
      snake.unshift(new_segment);
    }

    function drawScore () {
      ctx.beginPath();
      ctx.font = "20px Comic Sans MS";
      ctx.fillStyle = SNAKE_COLOR;
      ctx.fillText(`Score: ${score}`, 30, 30);
      ctx.closePath();
    }

    // FIXME: Bug with collision detection and movement.
    function draw () {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      moveSnake();
      drawScore();
      drawSnake();
      drawFruit(fruitX, fruitY);

      if (collidedWithFruit()) {
        addSegment();
        score++;
        fruitX = Math.floor(Math.random() * canvas.width);
        fruitY = Math.floor(Math.random() * canvas.height);
      }

      // Game Over
      if (collidedWithWall() || collidedWithSelf()) {
        clearInterval(game);
        alert("GAME OVER !!!");
        document.location.reload();
      }

    }

    document.addEventListener("keydown", function (evt) {
      evt.preventDefault();
      if (evt.key === 'Enter') {
        game = setInterval(draw, 100);
      } else if (evt.key === 'Up' || evt.key === 'ArrowUp' && !direction.down) {
        direction = { up: true, right: false, down: false, left: false };
      } else if (evt.key === 'Right' || evt.key === 'ArrowRight' && !direction.left) {
        direction = { up: false, right: true, down: false, left: false };
      } else if (evt.key === 'Down' || evt.key === 'ArrowDown' && !direction.up) {
        direction = { up: false, right: false, down: true, left: false };
      } else if (evt.key === 'Left' || evt.key === 'ArrowLeft' && !direction.right) {
        direction = { up: false, right: false, down: false, left: true };
      }

      // console.log(direction);
    })
  </script>
</body>

</html>
