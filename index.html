<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    h3 {
      width: fit-content;
      display: block;
      margin: 0 auto;
    }

    canvas {
      background: #9BBC0F;
      display: block;
      margin: 10px auto;
    }
  </style>

</head>

<body>
  <h3>Press ENTER to start game</h3>
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    const SNAKE_COLOR = "#306230";
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let x = 0;
    let y = 10;
    // const vel = 2;
    const seg_height = 10;
    const seg_width = 30;
    const segments = 3;
    const snake = [];

    // Populate snake body.
    for (let i = 0; i < segments; i++) {
      snake[i] = { x: seg_width * i, y };
    }

    // draw snake
    function drawSnake () {
      for (let i = 0; i < segments; i++) {
        ctx.beginPath();
        ctx.rect(snake[i].x, snake[i].y, seg_width, seg_height);
        ctx.fillStyle = i === segments - 1 ? "red" : SNAKE_COLOR;
        ctx.fill();
        ctx.closePath();
      }
    }

    function draw () {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSnake();


      for (let i = 0; i < segments - 1; i++) {
        snake[i].x = snake[i + 1].x;
        snake[i].y = snake[i + 1].y;
      }
      // console.log(snake);
      snake[segments - 1].x += seg_width;
    }

    document.addEventListener("keypress", function (evt) {
      if (evt.key === 'Enter') {
        setInterval(draw, 100);
      }
    })
  </script>
</body>

</html>
